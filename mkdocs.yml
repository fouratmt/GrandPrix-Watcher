site_name: F1 Race Monitor
site_description: API and usage documentation for f1-race-monitor.
repo_url: https://github.com/fourat/f1-race-monitor
theme:
  name: material
nav:
  - Home: index.md
  - Usage: usage.md
  - Configuration: configuration.md
  - Development: development.md
  - Publishing: publishing.md
  - API Reference: api.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
